# ===================================================================
#         Smart WebView v8 - MBAH GADGET FINAL (FIXED)
# ===================================================================
# 📌 VERSION: 8.2.0
# 🔒 DEBUG: OFF | SSL: ON | minify: ON
# ===================================================================

# ============================================
# 📱 BUILD CONFIGURATION
# ============================================
build.application.id=com.mbah.gadget
build.version.code=20
build.version.name=8.2.0
build.sdk.compile=36
build.sdk.min=24

# ============================================
# 🌐 URL CONFIGURATION
# ============================================
debug.mode=false
app.url=https://mbahgadget.co.id/
offline.url=file:///android_asset/web/offline.html
search.url=https://www.google.com/search?q=
external.url.exception.list=mbahgadget.co.id

# ============================================
# ⚙️ FEATURE FLAGS
# ============================================
feature.uploads=true
feature.camera.uploads=true
feature.multiple.uploads=true
feature.custom.css=false
feature.copy.paste=true
feature.pull.refresh=false
feature.progress.bar=false
feature.zoom=true
feature.save.form=false
feature.open.external.urls=true
feature.chrome.tabs=true
behavior.back.exits=false
feature.exit.dialog=true

# ============================================
# 🔒 PERMISSIONS & SECURITY
# ============================================
permissions.on.launch=NOTIFICATIONS,LOCATION
security.verify.ssl=true
security.block.screenshots=false
security.accept.thirdparty.cookies=true

# ============================================
# 🎨 UI & USER AGENT
# ============================================
ui.orientation=0
ui.layout=0
ui.drawer.header=false
ui.splash.extend=false
agent.postfix.enabled=true
agent.postfix.value=MBAHGADGETAndroid
agent.override.enabled=false

# ============================================
# 📊 ANALYTICS & PLUGINS
# ============================================
analytics.gtag.id=
plugins.enabled=LocationPlugin,DialogPlugin,AdMobPlugin,JSInterfacePlugin,ToastPlugin,QRScannerPlugin,BiometricPlugin,ImageCompressionPlugin,OneSignalPlugin
plugins.playground.enabled=false

# ============================================
# 🔔 ONESIGNAL APP ID
# ============================================
onesignal.app.id=e722a15b-0b07-4c82-a934-fcd0735704a2

# ============================================
# ⭐ RATING PLUGIN
# ============================================
rating.install.days=3
rating.launch.times=10
rating.remind.interval=2

# ============================================
# 🔐 BIOMETRIC
# ============================================
biometric.trigger.launch=false
