<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBAH GADGET</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 10%;
        }
        h1 {
            color: #00c853; /* Warna hijau khas toko Mbah Gadget */
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #666666;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: #00c853;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MBAH GADGET</h1>
        <p>Koneksi terputus atau memori aplikasi sedang disegarkan.</p>
        <p>Pastikan internet Anda aktif dan silakan coba muat ulang halaman.</p>
        <a href="javascript:window.location.reload(true)" class="btn">Muat Ulang Toko</a>
    </div>
</body>
</html>
