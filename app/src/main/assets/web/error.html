<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Error - MBAH GADGET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .error-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-icon {
            font-size: 72px;
            margin-bottom: 16px;
        }
        .error-title {
            color: #d32f2f;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .error-subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .error-message {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-retry {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #00c853;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-retry:hover {
            background: #00b84c;
            transform: scale(1.02);
        }
        .btn-retry:active {
            transform: scale(0.98);
        }
        .btn-retry svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        .btn-home {
            display: inline-block;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 10px;
            transition: color 0.3s ease;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }
        .btn-home:hover {
            color: #00c853;
        }
        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<main class="error-container">
    <div class="error-icon">⚠️</div>
    <h1 class="error-title">Gagal Memuat Halaman</h1>
    <p class="error-subtitle">MBAH GADGET</p>
    <p class="error-message">
        Terjadi kesalahan saat memuat halaman.<br>
        Periksa koneksi internet Anda dan coba lagi.
    </p>
    <div class="btn-group">
        <a href="javascript:window.location.reload(true)" class="btn-retry">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M17.65,6.35C16.2,4.9,14.21,4,12,4A8,8,0,0,0,4,12a8,8,0,0,0,8,8c3.73,0,6.84-2.55,7.73-6h-2.08c-.82,2.33-3.04,4-5.65,4-3.31,0-6-2.69-6-6s2.69-6,6-6c1.66,0,3.14.69,4.22,1.78L13,11h7V4l-2.35,2.35z"/>
            </svg>
            <span>Coba Lagi</span>
        </a>
        <hr class="divider">
        <a href="https://mbahgadget.co.id" class="btn-home">← Kembali ke Beranda</a>
    </div>
</main>
</body>
</html>
