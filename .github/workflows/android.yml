name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Force Custom Mbah Gadget Icon
        run: |
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp app/src/main/ic_launcher-playstore.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-MbahGadget-Debug
          path: app/build/outputs/apk/debug/*.apk
